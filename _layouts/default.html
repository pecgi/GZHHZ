<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- 样式 -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- 主题色 -->
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <a href="{{ '/' | relative_url }}" class="site-title">
          <span class="logo">📖</span>
          <span>{{ site.title }}</span>
        </a>
        <nav class="main-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link">首页</a>
          <a href="{{ '/archive' | relative_url }}" class="nav-link">归档</a>
          <a href="{{ '/tags' | relative_url }}" class="nav-link">标签</a>
          <a href="https://github.com/{{ site.github.owner_name }}/GZHHZ/issues/new/choose" class="nav-link nav-btn" target="_blank">+ 添加文章</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>使用 <a href="https://github.com/yourname/wechat-reader-template" target="_blank">WeChat Reader</a> 构建</p>
    </div>
  </footer>

  <script>
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('.theme-icon');
    const html = document.documentElement;
    
    // 读取保存的主题
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    updateIcon(savedTheme);
    
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateIcon(newTheme);
    });
    
    function updateIcon(theme) {
      themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
  </script>
</body>
</html>
